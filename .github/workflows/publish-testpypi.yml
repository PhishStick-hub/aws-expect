name: Publish to TestPyPI

on:
  push:
    tags:
      - "v*.*.*[abcdr]*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g., v0.2.0.dev1, v0.2.0rc1)'
        required: true
        type: string

jobs:
  publish-testpypi:
    name: Build and Publish to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/aws-expect/
    
    steps:
      - name: Validate tag input
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(\.dev[0-9]+|a[0-9]+|b[0-9]+|rc[0-9]+)$ ]]; then
            echo "ERROR: '$TAG' is not a valid pre-release tag (expected format: v0.2.0.dev1, v0.2.0a1, v0.2.0b1, v0.2.0rc1)"
            exit 1
          fi
          echo "Tag '$TAG' is valid."

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run quality checks
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run ty check

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TEST_TOKEN }}
        run: |
          uv publish --publish-url https://test.pypi.org/legacy/

      - name: Comment on commit with TestPyPI link
        run: |
          VERSION=$(grep -Po 'version = "\K[^"]*' pyproject.toml)
          echo "📦 Published to TestPyPI: https://test.pypi.org/project/aws-expect/$VERSION/"
